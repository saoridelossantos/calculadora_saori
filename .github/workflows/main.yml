name: Build iOS App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Create iOS Project Files
        # Este paso es VITAL: genera la carpeta /ios que falta en tu repo
        run: flutter create . --platforms=ios

      - name: Build iOS
        # Ahora que ya existe la configuración, podemos compilar
        run: flutter build ios --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-iOS-Saori
          path: build/ios/iphoneos/Runner.app
